<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Overzicht Medewerkers</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">

    <div class="topbar">
      <h1><i class="ti ti-users"></i> Overzicht medewerkers</h1>
      <div class="search-bar">
        <i class="ti ti-search"></i>
        <input type="text" id="searchInput" placeholder="Zoek op naam..." oninput="filterTable()" />
      </div>
    </div>

    <div class="stats">
      <div class="stat-card">
        <div class="label">Totaal medewerkers</div>
        <div class="value" id="totalCount">7</div>
      </div>
      <div class="stat-card">
        <div class="label">Afdelingen</div>
        <div class="value">5</div>
      </div>
      <div class="stat-card">
        <div class="label">Resultaten</div>
        <div class="value" id="resultCount">7</div>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Naam</th>
            <th>Functie</th>
            <th>Afdeling</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
      <div class="empty-state" id="emptyState" style="display:none;">
        <i class="ti ti-mood-empty"></i>
        <p>Geen medewerkers gevonden.</p>
      </div>
    </div>

  </div>

  <script src="medewerkers.js"></script>
</body>
</html>
